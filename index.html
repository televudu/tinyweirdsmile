<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <style>
      :root {
        color-scheme: dark light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
      }

      body {
        background: #000;
        overflow: hidden;
      }

      main {
        width: 100vw;
        height: 100vh;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <main>
      <iframe
        src="assets/documento.pdf"
        title="PDF"
      ></iframe>
    </main>
  </body>
</html>
