<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tiny Weird Smile</title>
    <style>
      :root {
        color-scheme: dark light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000;
        color: #f5f5f5;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      .viewer {
        width: 100vw;
        min-height: 100vh;
        display: flex;
        background: #000;
      }

      .viewer object {
        flex: 1;
        border: none;
        width: 100%;
        min-height: 100vh;
      }

      .fallback {
        margin: auto;
        max-width: 26rem;
        padding: 2rem;
        text-align: center;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 0.75rem;
      }

      .fallback a {
        color: #8dd0ff;
        text-decoration: underline;
        text-underline-offset: 0.2em;
      }
    </style>
  </head>
  <body>
    <main class="viewer" aria-label="Visor principal del PDF">
      <object
        data="assets/documento.pdf#zoom=page-fit"
        type="application/pdf"
        role="document"
      >
        <div class="fallback">
          <p>
            Tu navegador no pudo mostrar el PDF automáticamente.
            Puedes descargarlo y abrirlo manualmente:
          </p>
          <p>
            <a href="assets/documento.pdf" target="_blank" rel="noopener noreferrer">
              Descargar PDF
            </a>
          </p>
        </div>
      </object>
    </main>
  </body>
</html>
