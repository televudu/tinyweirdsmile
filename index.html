<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <style>
      :root {
        color-scheme: dark light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
      }

      body {
        background: #000;
        color: #fff;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: none;
        -webkit-font-smoothing: antialiased;
      }

      body::-webkit-scrollbar {
        display: none;
      }

      main {
        min-height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
      }

      #pdf-container {
        width: 100%;
        max-width: 100vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0;
        gap: 0;
      }

      canvas {
        width: 100%;
        height: auto;
        display: block;
      }

      #status {
        position: fixed;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.75);
        padding: 0.5rem 1rem;
        border-radius: 999px;
        font-size: 0.875rem;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div id="status">Cargando PDF…</div>
    <main>
      <div id="pdf-container" aria-label="Documento PDF"></div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.3.136/pdf.min.js"></script>
    <script>
      (function () {
        const pdfjsVersion = '4.3.136';
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${pdfjsVersion}/pdf.worker.min.js`;

        const container = document.getElementById('pdf-container');
        const statusEl = document.getElementById('status');
        const source = 'assets/documento.pdf';

        let pdfDoc = null;
        let resizeTimer = null;
        let rendering = false;

        const setStatus = (message) => {
          if (!statusEl) return;
          if (!message) {
            statusEl.remove();
            return;
          }
          statusEl.textContent = message;
        };

        const clearPages = () => {
          while (container.firstChild) {
            container.removeChild(container.firstChild);
          }
        };

        const renderPages = async () => {
          if (!pdfDoc || rendering) return;
          rendering = true;
          clearPages();

          const viewportWidth = window.innerWidth;

          for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum += 1) {
            const page = await pdfDoc.getPage(pageNum);
            const baseViewport = page.getViewport({ scale: 1 });
            const scale = viewportWidth / baseViewport.width;
            const viewport = page.getViewport({ scale });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d', { alpha: false });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            container.appendChild(canvas);

            await page.render({ canvasContext: context, viewport }).promise;
          }

          rendering = false;
          setStatus('');
        };

        const init = async () => {
          try {
            pdfDoc = await pdfjsLib.getDocument({ url: source }).promise;
            await renderPages();
          } catch (err) {
            console.error(err);
            setStatus('No se pudo cargar el PDF.');
          }
        };

        window.addEventListener('resize', () => {
          if (!pdfDoc) return;
          window.clearTimeout(resizeTimer);
          resizeTimer = window.setTimeout(() => {
            renderPages();
          }, 150);
        });

        init();
      })();
    </script>
  </body>
</html>
